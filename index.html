<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f7f4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="尽调表" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>高风险客户尽调表生成器</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./styles.css?v=21" />
  <script src="./app.js?v=22" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-title">
        <h1>高风险客户尽调表</h1>
        <p id="saveState">已保存</p>
      </div>
      <div class="topbar-actions">
        <button class="icon-button" type="button" id="textCleanerButton" aria-label="清理贷款文字" title="清理贷款文字">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 4h14M5 9h10M5 14h7" />
            <path d="m15 14 5 5m0-5-5 5" />
          </svg>
        </button>
        <button class="icon-button" type="button" id="pasteCustomerInfoButton" aria-label="粘贴客户资料" title="粘贴客户资料">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 4h8M9 3h6v3H9zM6 7h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z" />
            <path d="M8 12h8M8 16h5" />
          </svg>
        </button>
        <button class="icon-button" type="button" id="idCardOcrButton" aria-label="识别身份证" title="识别身份证">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <circle cx="8" cy="11" r="2" />
            <path d="M6 16c.6-1.6 1.7-2.4 3.2-2.4s2.6.8 3.2 2.4M14 10h4M14 14h4" />
          </svg>
        </button>
        <button class="icon-button" type="button" id="topDownloadButton" aria-label="保存图片" title="保存图片">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14" />
          </svg>
        </button>
      </div>
      <input id="idCardImageInput" type="file" accept="image/*" hidden />
    </header>

    <main class="layout">
      <form id="reportForm" class="form-stack" autocomplete="on">
        <div class="form-page active" data-page="customer">
          <section>
            <h2>机构信息</h2>
            <div class="grid two">
              <label>所属分中心<input name="branch" value="广州" /></label>
              <label>所属城市<input name="city" value="广州" /></label>
              <label class="span">所属团队<input name="team" value="海珠团队" /></label>
            </div>
          </section>

          <section>
            <h2>客户信息</h2>
            <div class="grid two">
              <label><span class="field-label">客户姓名</span><input name="customerName" /></label>
              <label><span class="field-label">客户性别</span>
                <select name="gender">
                  <option value=""></option>
                  <option>男</option>
                  <option>女</option>
                </select>
              </label>
              <label class="span">身份证号码<input name="idNumber" inputmode="text" /></label>
              <div class="employment-picker span" role="group" aria-labelledby="employmentTypeLabel">
                <span class="field-label" id="employmentTypeLabel">单位类型</span>
                <div class="employment-options">
                  <label class="choice-option"><input type="checkbox" name="workUnitSelected" data-employment-option checked />客户单位</label>
                  <label class="choice-option"><input type="checkbox" name="selfCompanySelected" data-employment-option />自雇公司（如有）</label>
                </div>
              </div>
              <label class="span">单位／公司名称<input name="employmentAddress" placeholder="填写已选择的单位或公司名称" /></label>
              <label class="span">客户居住地址<input name="homeAddress" /></label>
              <label>购车城市<input name="buyCity" value="广州" /></label>
              <label>客户电话<input name="phone" inputmode="tel" /></label>
            </div>
          </section>
        </div>

        <div class="form-page" data-page="loan">
          <section>
            <h2>贷款信息</h2>
            <div class="grid two">
              <label class="date-field">
                <span class="field-label">进件时间</span>
                <span class="date-shell">
                  <input class="date-display" id="submitDateDisplay" type="text" readonly tabindex="-1" aria-hidden="true" />
                  <input class="date-picker" name="submitDate" type="date" data-date-display="submitDateDisplay" />
                </span>
              </label>
              <label class="date-field">
                <span class="field-label">亲见日期</span>
                <span class="date-shell">
                  <input class="date-display" id="visitDateDisplay" type="text" readonly tabindex="-1" aria-hidden="true" />
                  <input class="date-picker" name="visitDate" type="date" data-date-display="visitDateDisplay" />
                </span>
              </label>
              <label>获客来源<input name="source" value="销售推荐" /></label>
              <label>意向品牌及车型<input name="carModel" /></label>
              <label>拟贷款成数<input name="loanPercent" inputmode="decimal" placeholder="例：70" /></label>
              <label>贷款金额（万）<input name="loanAmount" inputmode="decimal" /></label>
              <label><span class="field-label">主要收入来源</span>
                <select name="incomeSource">
                  <option>工资收入</option>
                  <option>经营收入</option>
                  <option>租金收入</option>
                  <option>其他资产性收入</option>
                </select>
              </label>
              <label><span class="field-label">年收入情况</span><input name="incomeRange" value="12-15万" /></label>
              <label class="span">其他情况说明<textarea name="otherNotes"></textarea></label>
            </div>
          </section>

          <section>
            <h2>核实情况</h2>
            <div class="check-list two">
              <label><input type="checkbox" name="fraudWarn" checked />已进行骗贷提醒</label>
              <label><input type="checkbox" name="addressOk" checked />工作、居住地址无异常</label>
            </div>
          </section>

          <section>
            <h2>首付信息</h2>
            <div class="grid two">
              <label>首付款支付方式
                <select name="payMethod">
                  <option>本人转账支付</option>
                  <option>本人现金支付</option>
                  <option>他人代付</option>
                </select>
              </label>
              <label>代付关系
                <select name="payerRelation">
                  <option value=""></option>
                  <option>直系亲属</option>
                  <option>朋友</option>
                  <option>其他</option>
                </select>
              </label>
            </div>
          </section>
        </div>

        <div class="form-page" data-page="done">
          <section>
            <h2>手写签字</h2>
            <div class="grid" id="signatureHome">
              <div class="signature-box span is-collapsed">
                <div class="signature-head">
                  <div class="signature-title">
                    <span>手写客户经理签字</span>
                    <small id="signatureState">未保存手写签字</small>
                  </div>
                  <button type="button" class="signature-toggle" id="signatureToggleButton" aria-expanded="false" aria-controls="signaturePanel">展开</button>
                </div>
                <div class="signature-panel" id="signaturePanel">
                  <canvas id="managerSignaturePad" width="720" height="220" aria-label="手写客户经理签字"></canvas>
                  <div class="signature-actions">
                    <button type="button" class="secondary signature-fullscreen-button" id="signatureFullscreenButton">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5" />
                      </svg>
                      <span>横屏全屏</span>
                    </button>
                    <button type="button" class="secondary" id="saveSignatureButton">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z" />
                        <path d="M17 21v-8H7v8M7 3v5h8" />
                      </svg>
                      保存签名
                    </button>
                    <button type="button" class="secondary" id="clearSignatureButton">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6M10 11v6M14 11v6" />
                      </svg>
                      清除签名
                    </button>
                  </div>
                </div>
                <div class="signature-clear-confirm" id="signatureClearConfirm" hidden>
                  <div class="signature-clear-card" role="dialog" aria-modal="true" aria-labelledby="signatureClearConfirmTitle" aria-describedby="signatureClearConfirmMessage">
                    <h3 id="signatureClearConfirmTitle">清除签名</h3>
                    <p id="signatureClearConfirmMessage">确定清除当前手写签名吗？清除后需要重新手写并保存。</p>
                    <div class="signature-clear-actions">
                      <button type="button" class="secondary" id="cancelClearSignatureButton">取消</button>
                      <button type="button" class="danger" id="confirmClearSignatureButton">确认清除</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="preview-section">
            <h2>预览</h2>
            <div class="preview">
              <img id="previewImage" alt="生成图片预览" />
            </div>
          </section>

          <section class="actions">
            <a id="downloadLink" download="高风险客户尽职调查表.png">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14" />
              </svg>
              下载图片
            </a>
            <button type="button" id="clearButton" class="secondary">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6M10 11v6M14 11v6" />
              </svg>
              清空
            </button>
          </section>
        </div>
      </form>
    </main>

    <nav class="bottom-nav" aria-label="表单分组导航">
      <button type="button" class="nav-button active" data-target-page="customer" aria-current="page">
        <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="8" r="3.5" />
          <path d="M5 20c.7-3.6 3.1-5.5 7-5.5s6.3 1.9 7 5.5" />
        </svg>
        <span>客户</span>
      </button>
      <button type="button" class="nav-button" data-target-page="loan">
        <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 3h9l4 4v14H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z" />
          <path d="M14 3v5h5M8 13h8M8 17h6M8 9h2" />
        </svg>
        <span>贷款</span>
      </button>
      <button type="button" class="nav-button" data-target-page="done">
        <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
        </svg>
        <span>完成</span>
      </button>
    </nav>
  </div>

  <div class="paste-sheet" id="pasteCustomerSheet" hidden>
    <div class="paste-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="pasteCustomerSheetTitle">
      <div class="paste-sheet-head">
        <h2 id="pasteCustomerSheetTitle">粘贴客户资料</h2>
        <button class="paste-sheet-close" type="button" id="closePasteCustomerSheetButton" aria-label="关闭">×</button>
      </div>
      <div class="paste-sheet-body">
        <p class="paste-sheet-hint">仅识别姓名、电话、单位名称和居住地址。</p>
        <textarea id="pastedCustomerInfo" aria-label="客户资料" placeholder="在这里粘贴客户资料"></textarea>
        <div class="paste-sheet-primary-actions">
          <button class="secondary" type="button" id="pasteCustomerClipboardButton">粘贴</button>
          <button type="button" id="parsePastedCustomerInfoButton">识别资料</button>
        </div>
        <div class="paste-sheet-result" id="pastedCustomerResult" hidden>
          <p>请确认识别结果</p>
          <dl>
            <dt>客户姓名</dt><dd id="pastedResultName">未识别</dd>
            <dt>客户电话</dt><dd id="pastedResultPhone">未识别</dd>
            <dt>单位名称</dt><dd id="pastedResultCompany">未识别</dd>
            <dt>居住地址</dt><dd id="pastedResultAddress">未识别</dd>
          </dl>
          <div class="paste-sheet-actions">
            <button type="button" class="secondary" id="cancelPastedCustomerInfoButton">取消</button>
            <button type="button" id="applyPastedCustomerInfoButton">确认填入</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="paste-sheet" id="textCleanerSheet" hidden>
    <div class="paste-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="textCleanerSheetTitle">
      <div class="paste-sheet-head">
        <h2 id="textCleanerSheetTitle">清理贷款文字</h2>
        <button class="paste-sheet-close" type="button" id="closeTextCleanerSheetButton" aria-label="关闭">×</button>
      </div>
      <div class="paste-sheet-body">
        <p class="paste-sheet-hint">粘贴原文后，将自动删除指定的附加费用贷款说明。</p>
        <label class="text-cleaner-field">
          <span>原始文字</span>
          <textarea id="textCleanerInput" placeholder="在这里粘贴需要清理的文字"></textarea>
        </label>
        <button class="secondary" type="button" id="pasteTextCleanerButton">粘贴并清理</button>
        <label class="text-cleaner-field">
          <span>清理结果（可手动编辑）</span>
          <textarea id="textCleanerOutput" placeholder="清理后的结果会显示在这里"></textarea>
        </label>
        <p class="text-cleaner-status" id="textCleanerStatus" aria-live="polite"></p>
        <button type="button" id="copyCleanedTextButton" disabled>复制结果</button>
      </div>
    </div>
  </div>

  <div class="signature-fullscreen-layer" id="signatureFullscreenLayer" hidden aria-hidden="true">
    <div class="signature-landscape-shell" id="signatureLandscapeShell"></div>
  </div>

  <canvas id="reportCanvas" width="1588" height="2246"></canvas>
</body>
</html>
